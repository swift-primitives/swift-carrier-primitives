name: Link Check

# Pilot integration of the centralized link-checker — see
# swift-institute/.github/.github/workflows/swift-links.yml
#
# Pinned at @main during the pilot; bump to @v1 after one PR run and one
# scheduled run have validated the shape on this repo.
#
# Behavior is event-derived:
#   - pull_request → fail on broken links (PR gate)
#   - schedule / workflow_dispatch → file/update tracking issue, don't fail

on:
  pull_request:
    paths:
      - '**/*.md'
      - '**/*.docc/**'
      - 'Sources/**/*.swift'
  schedule:
    - cron: '0 6 * * 1'   # Weekly Monday 06:00 UTC
  workflow_dispatch:

concurrency:
  group: links-${{ github.ref }}
  cancel-in-progress: true

jobs:
  links:
    permissions:
      contents: read
      issues: write
    uses: swift-institute/.github/.github/workflows/swift-links.yml@main
    with:
      fail-on-error: ${{ github.event_name == 'pull_request' }}
      create-issue: ${{ github.event_name != 'pull_request' }}
