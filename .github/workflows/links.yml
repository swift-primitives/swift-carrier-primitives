name: Link Check

# Pilot integration of the centralized link-checker — see
# swift-institute/.github/.github/workflows/swift-links.yml
#
# Pinned at @main during the pilot; bump to @v1 after one PR run and one
# scheduled run have validated the shape on this repo.

on:
  pull_request:
    paths:
      - '**/*.md'
      - '**/*.docc/**'
      - 'Sources/**/*.swift'
  schedule:
    - cron: '0 6 * * 1'   # Weekly Monday 06:00 UTC
  workflow_dispatch:

concurrency:
  group: links-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # PR gate — fail the check on broken links so PRs can't introduce them.
  pr-links:
    if: github.event_name == 'pull_request'
    uses: swift-institute/.github/.github/workflows/swift-links.yml@main
    with:
      fail-on-error: true

  # Scheduled rot detection — file/update a tracking issue rather than
  # redden main. Link rot is informational, not a code regression.
  scheduled-links:
    if: github.event_name != 'pull_request'
    uses: swift-institute/.github/.github/workflows/swift-links.yml@main
    with:
      fail-on-error: false
      create-issue: true
    permissions:
      contents: read
      issues: write
