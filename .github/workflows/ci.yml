name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build + test matrix — see swift-primitives/.github/.github/workflows/swift-ci.yml
  # (layer wrapper that delegates universal jobs to swift-institute and adds
  # the L1 embedded-build invariant)
  ci:
    uses: swift-primitives/.github/.github/workflows/swift-ci.yml@main
    secrets: inherit

  # DocC umbrella-catalog validation per [DOC-019a] — see
  # swift-primitives/.github/.github/workflows/swift-docs.yml
  docs:
    uses: swift-primitives/.github/.github/workflows/swift-docs.yml@main
    secrets: inherit

  # Institute swift-linter — a cross-org PRODUCT reusable in swift-foundations.
  # `secrets: inherit` delivers nothing across the org boundary ([CI-109]), so
  # PRIVATE_REPO_TOKEN is explicit-forwarded (resolved in this repo's
  # swift-primitives org context). advisory: true keeps the job non-gating
  # while we soak the linter across L1 consumers.
  lint:
    uses: swift-foundations/swift-linter/.github/workflows/lint.yml@main
    with:
      advisory: true
    secrets:
      PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
