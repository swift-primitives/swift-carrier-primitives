name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build + test matrix — see swift-institute/.github/.github/workflows/swift-ci.yml
  ci:
    uses: swift-institute/.github/.github/workflows/swift-ci.yml@v1
    with:
      cache-key-prefix: swift63-spm-v1

  # DocC umbrella-catalog validation per [DOC-019a] — see
  # swift-institute/.github/.github/workflows/swift-docs.yml
  docs:
    uses: swift-institute/.github/.github/workflows/swift-docs.yml@v1
    with:
      umbrella-module: Carrier_Primitives
      umbrella-display-name: "Carrier Primitives"
      umbrella-bundle-id: "swift-carrier-primitives.Carrier-Primitives"
      umbrella-docc-path: "Sources/Carrier Primitives/Carrier Primitives.docc"
      exclude-modules: "Carrier_Primitives_Test_Support"
